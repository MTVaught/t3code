name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Check
        run: vp check

      - name: Typecheck
        run: vpr typecheck

      - name: Build desktop pipeline
        run: vp run build:desktop

      - name: Verify preload bundle output
        run: |
          test -f apps/desktop/dist-electron/preload.cjs
          grep -nE "desktopBridge|getLocalEnvironmentBootstrap|PICK_FOLDER_CHANNEL|wsUrl" apps/desktop/dist-electron/preload.cjs
          grep -n "__clerk_internal_electron_passkeys" apps/desktop/dist-electron/preload.cjs

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Test
        run: vp run test

  mobile_native_static_analysis:
    name: Mobile Native Static Analysis
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Install mobile native static analysis tools
        run: brew bundle install --file apps/mobile/Brewfile

      - name: Lint mobile native sources
        run: vp run lint:mobile

  release_smoke:
    name: Release Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts

  # We ship to users who must run on RHEL8. GitHub offers no RHEL8 runner and
  # real RHEL8 needs a subscription, so this builds the Linux AppImage on the
  # normal runner and then launch-tests it inside a RHEL8-ABI-compatible
  # container (Rocky Linux 8 -- same glibc 2.28 as RHEL8). Entirely free Actions
  # minutes; fails the build if the app cannot launch on RHEL8.
  linux_rhel8:
    name: Linux RHEL8 Launch Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Install ImageMagick
        run: |
          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y imagemagick
          fi

      - name: Set up old-glibc (RHEL8) compiler for native modules
        run: bash scripts/setup-zig-glibc.sh

      - name: Build Linux x64 AppImage
        run: vp run dist:desktop:artifact --platform linux --target AppImage --arch x64 --verbose

      - name: Launch on RHEL8 (Rocky Linux 8, glibc 2.28)
        run: |
          set -euo pipefail
          appimage="$(ls release/*.AppImage | head -1)"
          echo "Testing: ${appimage}"
          docker run --rm \
            -v "${PWD}:/work" -w /work \
            rockylinux:8 \
            bash scripts/rhel8-appimage-gate.sh "/work/${appimage}"
